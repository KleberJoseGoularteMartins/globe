<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto HTML da EBAC com uma pagina inicial organizada, responsiva e com navegacao interna.">
    <title>EBAC Tecnologia</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eff4fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --accent-soft: #dbeafe;
            --border: #dbe3ee;
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32%),
                radial-gradient(circle at top right, rgba(99, 102, 241, 0.10), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            color: var(--text);
        }

        a {
            color: inherit;
        }

        .page {
            min-height: 100vh;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(18px);
            background: rgba(248, 251, 255, 0.82);
            border-bottom: 1px solid rgba(219, 227, 238, 0.8);
        }

        .header-inner,
        .content,
        .site-footer {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 16px 0;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.25);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 14px;
        }

        .nav a {
            text-decoration: none;
            color: var(--muted);
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .nav a:hover,
        .nav a:focus-visible {
            color: var(--accent);
        }

        .content {
            display: grid;
            gap: 24px;
            padding: 24px 0 40px;
        }

        .hero,
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .hero {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 28px;
            padding: 32px;
            overflow: hidden;
        }

        .hero-copy,
        .section-copy {
            display: grid;
            gap: 16px;
            align-content: center;
        }

        .hero-copy p,
        .section-copy p,
        .section p,
        .contact-box p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .eyebrow {
            display: inline-block;
            margin: 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 5vw, 4rem);
            line-height: 1.05;
        }

        .hero-media-wrap {
            display: grid;
            align-items: center;
            position: relative;
        }

        .hero-media {
            width: 100%;
            min-height: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #dbeafe;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .button:hover,
        .button:focus-visible {
            transform: translateY(-1px);
        }

        .button.primary:hover,
        .button.primary:focus-visible {
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        }

        .button.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .button.secondary {
            background: #f8fbff;
            color: var(--accent);
            border-color: #cfe0ff;
        }

        .section {
            display: grid;
            gap: 18px;
            padding: 32px;
        }

        .section-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            flex-wrap: wrap;
        }

        .section-title {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2.1rem);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .feature-card {
            padding: 20px;
            border-radius: 18px;
            background: linear-gradient(180deg, #f8fbff 0%, #ffffff 100%);
            border: 1px solid var(--border);
        }

        .feature-card h3 {
            margin: 12px 0 8px;
            font-size: 1.05rem;
        }

        .feature-card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.65;
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 800;
        }

        .list-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .list-item {
            padding: 18px 20px;
            border-radius: 18px;
            background: #f8fbff;
            border: 1px solid var(--border);
        }

        .list-item strong {
            display: block;
            margin-bottom: 6px;
        }

        .list-item span {
            color: var(--muted);
            line-height: 1.6;
        }

        .contact-box {
            display: grid;
            gap: 12px;
            padding: 20px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(59, 130, 246, 0.04));
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .contact-box a {
            color: var(--accent-strong);
            font-weight: 700;
            text-decoration: none;
        }

        .contact-box a:hover,
        .contact-box a:focus-visible {
            text-decoration: underline;
        }

        .site-footer {
            padding: 0 0 32px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .header-inner,
            .section-header {
                align-items: start;
                flex-direction: column;
            }

            .nav {
                justify-content: flex-start;
            }

            .hero,
            .section {
                padding: 24px;
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .feature-grid,
            .list-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                    <span>EBAC Tecnologia</span>
                </a>
