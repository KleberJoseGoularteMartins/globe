name: Build and deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (extracted)
        working-directory: extracted
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Build modular bundle (extracted)
        working-directory: extracted
        run: npm run build

      - name: Prepare site artifact
        run: |
          rm -rf site || true
          mkdir -p site
          # copy repo files required for serving the site
          cp -r index.html site/
          # copy top-level assets if present
          if [ -d public ]; then cp -r public site/; fi
          # copy extracted built files and necessary runtime files
          cp -r extracted site/

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
