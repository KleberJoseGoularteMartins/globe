<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto HTML da EBAC com uma pagina inicial simples e organizada.">
    <title>EBAC Tecnologia</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --border: #dbe3ee;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 760px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
            padding: 32px;
        }

        .eyebrow {
            display: inline-block;
            margin: 0 0 12px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #eaf1ff;
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.25rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .hero {
            display: grid;
            gap: 20px;
        }

        .hero-media {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #dbeafe;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .button.primary {
            background: var(--accent);
            color: #fff;
        }

        .button.secondary {
            background: #eef4ff;
            color: var(--accent);
            border-color: #cfe0ff;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card hero" aria-labelledby="hero-title">
            <p class="eyebrow">EBAC Tecnologia</p>
            <h1 id="hero-title">Uma base organizada para o seu projeto HTML</h1>
            <p>
                Esta pagina inicial foi estruturada para servir como ponto de partida para o
                desenvolvimento do seu conteudo, com uma hierarquia clara e layout responsivo.
            </p>
            <img
                class="hero-media"
                src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80"
                alt="Pessoa trabalhando em um notebook em um ambiente moderno"
            >
            <div class="actions">
                <a class="button primary" href="#">Comecar agora</a>
                <a class="button secondary" href="#">Saiba mais</a>
            </div>
        </section>
    </main>
</body>
</html>
