<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Globo Interativo — Extraído</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!--
    Este arquivo carrega o bundle beautified já presente na raiz do workspace
    como `../globo-interativo-beautified.js` (mantenha esse arquivo no nível
    superior ou ajuste o caminho para `main.js` se preferir copiar o bundle).
  -->
  <script>
    // Se estivermos servindo de uma subpasta (/extracted/index.html), ajustar a
    // URL para a raiz esperada pelo roteador da aplicação.
    if (location.pathname !== '/') {
      history.replaceState({}, '', '/');
    }
  </script>
  <script type="module" src="/extracted/main.js"></script>
</body>
</html>
